<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retriever Chat UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'cream': '#fbf8f1',
              'cream-dark': '#f3f0e6',
              'brand-green': '#4ade80',
              'brand-green-dark': '#22c55e',
              'ink': '#1e293b',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f0e6;
      }
      /* Custom scrollbar to match the aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Modal Animations */
      @keyframes modal-backdrop-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes modal-backdrop-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      @keyframes modal-content-in {
        from { opacity: 0; transform: scale(0.95) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes modal-content-out {
        from { opacity: 1; transform: scale(1) translateY(0); }
        to { opacity: 0; transform: scale(0.95) translateY(10px); }
      }

      .animate-backdrop-in {
        animation: modal-backdrop-in 0.2s ease-out forwards;
      }
      .animate-backdrop-out {
        animation: modal-backdrop-out 0.2s ease-in forwards;
      }
      .animate-modal-in {
        animation: modal-content-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-modal-out {
        animation: modal-content-out 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script>
      console.log('Index.html loaded, attempting to load index.tsx...');
      window.addEventListener('error', function(e) {
        console.error('Global Error caught in index.html:', e.error);
      }, true);
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
